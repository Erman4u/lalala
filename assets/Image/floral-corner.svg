<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Floral Corner Ornament -->
    <g fill="#ec407a" opacity="0.8">
        <!-- Main curved vine -->
        <path d="M0,0 C10,30 30,50 60,60 C70,63 80,65 90,65 C70,55 50,35 40,10 C35,0 35,0 0,0 Z" />
        
        <!-- Large Flower -->
        <path d="M20,30 C15,20 25,10 35,15 C45,10 55,20 50,30 C60,40 50,50 40,45 C30,50 20,40 25,30 Z" />
        <circle cx="35" cy="30" r="5" fill="#f48fb1" />
        
        <!-- Small Flower -->
        <path d="M60,45 C55,40 60,35 65,37 C70,35 75,40 72,45 C77,50 72,55 67,52 C62,55 57,50 60,45 Z" />
        <circle cx="65" cy="45" r="3" fill="#f48fb1" />
        
        <!-- Leaves -->
        <path d="M10,15 C15,25 25,25 20,15 C15,5 5,5 10,15 Z" />
        <path d="M45,50 C55,55 55,65 45,60 C35,55 35,45 45,50 Z" />
        <path d="M75,60 C80,65 75,70 70,65 C65,60 70,55 75,60 Z" />
    </g>
</svg>
