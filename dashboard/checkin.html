<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner - Gerald & Mega Wedding</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- HTML5 QR Code Scanner -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body style="background: var(--bg-card); display: flex; flex-direction: column;">

  <header class="topbar" style="position: relative;">
    <div class="topbar-title"><i class="bi bi-qr-code-scan"></i> Check-in Tamu</div>
    <div class="topbar-right">
      <button class="btn btn-sm btn-outline" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Keluar</button>
    </div>
  </header>

  <main style="flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;">
    
    <div class="scanner-wrap" style="width: 100%;">
      
      <!-- SCANNER AREA -->
      <div id="scanner-container" style="width: 100%; border-radius: 16px; overflow: hidden; background: #000; position: relative;">
        <div id="qr-reader" style="width: 100%;"></div>
      </div>

      <!-- STATUS & MANUAL INPUT -->
      <div style="width: 100%; display: flex; gap: 10px;">
        <input type="text" class="form-control" id="manualToken" placeholder="Atau ketik token QR manual...">
        <button class="btn btn-primary" id="btnManualCheckin"><i class="bi bi-check-lg"></i></button>
      </div>

      <!-- RESULT CARD -->
      <div class="scan-result" id="scanResult" style="display: none;">
        <i class="bi bi-person-check-fill scan-icon" id="resultIcon"></i>
        <div class="scan-guest-name" id="resultName">Nama Tamu</div>
        <p style="color: var(--text-muted); font-size: 0.9rem;" id="resultGroup">Grup / Sesi</p>
        
        <div style="margin-top: 15px; display: flex; gap: 10px; width: 100%;">
          <button class="btn btn-success" id="btnConfirmCheckin" style="flex: 1; justify-content: center; display: none;">
            <i class="bi bi-check-circle"></i> Konfirmasi Hadir
          </button>
          <button class="btn btn-outline" id="btnScanAgain" style="flex: 1; justify-content: center;">
            <i class="bi bi-qr-code-scan"></i> Scan Lagi
          </button>
        </div>
      </div>

    </div>

  </main>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Audio feedbacks -->
  <audio id="beepSuccess" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
  <audio id="beepError" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

  <script src="config.js"></script>
  <script src="checkin.js"></script>
</body>
</html>
