<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mega & Emerald Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>Bagus & Sekar</h1>
        <p>Wedding Dashboard Login</p>
      </div>

      <div class="login-error" id="loginError">
        <i class="bi bi-exclamation-triangle"></i> <span id="errorMessage">Email atau password salah.</span>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required placeholder="admin@wedding.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
          Masuk <i class="bi bi-box-arrow-in-right"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
